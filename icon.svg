<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <!-- 背景 -->
  <rect width="180" height="180" rx="36" fill="#d4aa6e"/>
  <!-- 棋盤線 -->
  <g stroke="#8b6340" stroke-width="1.5">
    <line x1="30" y1="30" x2="30" y2="150"/>
    <line x1="60" y1="30" x2="60" y2="150"/>
    <line x1="90" y1="30" x2="90" y2="150"/>
    <line x1="120" y1="30" x2="120" y2="150"/>
    <line x1="150" y1="30" x2="150" y2="150"/>
    <line x1="30" y1="30" x2="150" y2="30"/>
    <line x1="30" y1="60" x2="150" y2="60"/>
    <line x1="30" y1="90" x2="150" y2="90"/>
    <line x1="30" y1="120" x2="150" y2="120"/>
    <line x1="30" y1="150" x2="150" y2="150"/>
  </g>
  <!-- 黑子 -->
  <circle cx="90" cy="90" r="13" fill="#1a1a2e"/>
  <circle cx="60" cy="60" r="13" fill="#1a1a2e"/>
  <circle cx="120" cy="120" r="13" fill="#1a1a2e"/>
  <!-- 白子 -->
  <circle cx="120" cy="60" r="13" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <circle cx="60" cy="120" r="13" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
</svg>
